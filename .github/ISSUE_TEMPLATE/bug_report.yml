name: 🐛 Bug report
description: Something misbehaves, crashes, or flags a process it shouldn't.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! A little detail goes a long way.
  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: e.g. Windows 11 23H2 / macOS 14.5 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: install
    attributes:
      label: How did you install RAM Optimizer?
      placeholder: cargo install / cargo build --release / setup script
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: >
        Relevant lines from `~/.ram-optimizer/ram-optimizer.log`, the offending run from
        `~/.ram-optimizer/runs.jsonl`, or `ram-optimizer --dump` output. Please scrub anything private.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for a duplicate.
          required: true
